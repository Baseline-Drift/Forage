<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Forage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #faf9f6; font-family: 'DM Serif Display', Georgia, serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
    input, select, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 0; }

    @keyframes popIn {
      0%   { transform: translateX(-50%) scale(0.7); opacity: 0; }
      70%  { transform: translateX(-50%) scale(1.05); opacity: 1; }
      100% { transform: translateX(-50%) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Grocery data ─────────────────────────────── */
    const GROCERY_DATA = {
      '🥦 Produce':       ['Tomatoes','Cucumber','Baby cos lettuce','Avocados','Onion small','Red onion','Red capsicum','Yellow capsicum','Lemons','Limes','Coriander','Potato'],
      '🍓 Fruit':         ['Bananas','Apples Pink Lady','Raspberries','Strawberries','Pears'],
      '🧀 Dairy & Eggs':  ['Milk 2L','Eggs','Nuttelex','Butter','Sour cream','Chobani Vanilla Bean Yoghurt','Cheese slices','Block cheese','Four cheese mix'],
      '🥩 Meat':          ['Mince Bolognese','Mince Extra Lean','Steak','Ham','Chicken loaf'],
      '🥣 Breakfast':     ['Weetbix','Porridge / Oats','Cereal','Up & Go'],
      '☕ Drinks':         ['Coffee','Tea','Sugar','Milo','Poppers'],
      '🍝 Pantry':        ['Spaghetti','Spaghetti sauce','Rigatoni','Spiral pasta','Pasta bake sauce','Italian tomatoes tinned','Tuna tins','Vegemite','Peanut Butter','Bread'],
      '🌮 Mexican':       ['Nacho chips','Mexe beans','Nacho Sauce','Nacho flavour packet','Sour cream'],
      '🍜 Noodles':       ['Noodle Cups Chicken','Noodles spicy'],
      '🍪 Snacks':        ['Chip box','LeSnack','Cookies',"Arnott's Mini Choc Chip cookies","Arnott's Mini Scotch fingers",'Tiny Teddies','Shapes',"Carmen's double dark Choc protein bar"],
      '❄️ Frozen':        ['Frozen veggies','Frozen chips','Veggie patties'],
      '🐱 Pet':           ['Cat food - wet','Cat food - dry','Cat litter pellets','Cat litter crystals','Cat litter bags'],
      '🧹 Cleaning':      ['Floor cleaner','Laundry liquid','General cleaner','Bathroom cleaner','Toilet cleaner','Dish cloths','Dishwashing liquid','Dishwasher tablets'],
      '🧻 Household':     ['Rubbish bags large','Rubbish bags small','Sandwich ziplock bags','Aluminium foil','Baking paper','Plastic wrap','Toilet paper','Tissues','Paper towels'],
      '🚿 Personal Care': ['Body Wash','My shampoo','Shampoo','Conditioner','Hand soap refill'],
      '🍷 Other':         ['Red Wine (spaghetti)'],
    };
    const DEFAULT_ORDER = Object.keys(GROCERY_DATA);

    /* ── Storage ──────────────────────────────────── */
    const K = {
      state:    'forage-state-v1',
      custom:   'forage-custom-v1',
      hidden:   'forage-hidden-v1',
      order:    'forage-order-v1',
      lastShop: 'forage-last-v1',
    };
    const load = (key, fb) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } };
    const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

    const ACE_LINES = [
      "/\\_/\\\n( ◕_◕ )\n > 🌮 <\n\nACE FOUND THE NACHOS.\nSHE IS NOT SHARING.",
      "/\\_/\\\n( ◉_◉ )\n > 🐟 <\n\nACE IS EATING TUNA.\nDIRECTLY FROM THE TIN.",
      "/\\_/\\\n( >_< )\n > 🍌 <\n\nACE TRIED A BANANA.\nSHE REGRETS NOTHING.",
      "/\\_/\\\n( ᵕ_ᵕ )\n > 🧀 <\n\nACE LOCATED THE CHEESE.\nIT IS HERS NOW.",
    ];

    /* ── Main App ─────────────────────────────────── */
    function App() {
      const [itemState,   setItemState]   = useState(() => load(K.state,  {}));
      const [customItems, setCustomItems] = useState(() => load(K.custom, {}));
      const [hiddenItems, setHiddenItems] = useState(() => load(K.hidden, []));
      const [lastShop,    setLastShop]    = useState(() => load(K.lastShop, null));
      const [catOrder, setCatOrder] = useState(() => {
        const saved = load(K.order, null);
        if (!saved) return DEFAULT_ORDER;
        const extra = DEFAULT_ORDER.filter(c => !saved.includes(c));
        return [...saved, ...extra];
      });

      const [search,      setSearch]      = useState('');
      const [filterCat,   setFilterCat]   = useState('All');
      const [hideChecked, setHideChecked] = useState(false);
      const [mode,        setMode]        = useState('all');
      const [openCats,    setOpenCats]    = useState(() => Object.fromEntries(DEFAULT_ORDER.map(c => [c, true])));
      const [editingCat,  setEditingCat]  = useState(null);
      const [newItemText, setNewItemText] = useState('');
      const [sortMode,    setSortMode]    = useState(false);
      const [editQtyKey,  setEditQtyKey]  = useState(null);
      const [editNameKey, setEditNameKey] = useState(null);
      const [editNameVal, setEditNameVal] = useState('');
      const [toast,       setToast]       = useState(null);
      const [undoItem,    setUndoItem]    = useState(null);
      const [holdKey,     setHoldKey]     = useState(null);
      const [aceMsg,      setAceMsg]      = useState(null);
      const [titleTaps,   setTitleTaps]   = useState(0);

      const holdTimer  = useRef(null);
      const undoTimer  = useRef(null);
      const nameTimer  = useRef(null);
      const titleTimer = useRef(null);

      useEffect(() => save(K.state,    itemState),   [itemState]);
      useEffect(() => save(K.custom,   customItems), [customItems]);
      useEffect(() => save(K.hidden,   hiddenItems), [hiddenItems]);
      useEffect(() => save(K.order,    catOrder),    [catOrder]);
      useEffect(() => { if (lastShop) save(K.lastShop, lastShop); }, [lastShop]);
      useEffect(() => () => {
        clearTimeout(holdTimer.current);
        clearTimeout(undoTimer.current);
        clearTimeout(nameTimer.current);
        clearTimeout(titleTimer.current);
      }, []);

      /* derived categories */
      const allCategories = {};
      catOrder.forEach(cat => {
        const defaults = (GROCERY_DATA[cat] || []).filter(item => !hiddenItems.includes(`${cat}::${item}`));
        allCategories[cat] = { defaults, customs: customItems[cat] || [] };
      });

      /* item state */
      const getIS    = key => itemState[key] || { checked: false, starred: false, qty: 1, name: null };
      const updateIS = (key, u) => setItemState(p => ({ ...p, [key]: { ...getIS(key), ...u } }));
      const toggleCheck = key => updateIS(key, { checked: !getIS(key).checked });
      const toggleStar  = key => updateIS(key, { starred: !getIS(key).starred });
      const setQty      = (key, qty) => updateIS(key, { qty: Math.max(1, qty) });

      /* totals */
      const allKeys      = catOrder.flatMap(cat => { const { defaults=[], customs=[] } = allCategories[cat]||{}; return [...defaults,...customs].map(item=>`${cat}::${item}`); });
      const totalCount   = allKeys.length;
      const checkedCount = allKeys.filter(k => getIS(k).checked).length;
      const starredKeys  = allKeys.filter(k => getIS(k).starred);
      const pct          = totalCount > 0 ? Math.round((checkedCount/totalCount)*100) : 0;
      const allChecked   = checkedCount === totalCount;

      /* select all / deselect all */
      const toggleAll = () => {
        if (allChecked) {
          setItemState(p => { const n={...p}; Object.keys(n).forEach(k=>{n[k]={...n[k],checked:false};}); return n; });
        } else {
          const updates = {};
          allKeys.forEach(k => { updates[k] = { ...getIS(k), checked: true }; });
          setItemState(p => ({ ...p, ...updates }));
        }
      };

      /* add item */
      const addItem = cat => {
        const text = newItemText.trim();
        if (!text) return;
        setCustomItems(p => ({ ...p, [cat]: [...(p[cat] || []), text] }));
        setNewItemText('');
        setEditingCat(null);
        showToast('Item added ✓');
      };

      /* delete with undo */
      const performDelete = (cat, item, isCustom) => {
        const key = `${cat}::${item}`;
        setUndoItem({ cat, item, isCustom, itemStateSnap: itemState[key], customSnap: isCustom ? [...(customItems[cat] || [])] : null, hiddenSnap: [...hiddenItems] });
        if (isCustom) {
          setCustomItems(p => ({ ...p, [cat]: (p[cat] || []).filter(i => i !== item) }));
        } else {
          setHiddenItems(p => [...p, key]);
        }
        setItemState(p => { const n = { ...p }; delete n[key]; return n; });
        clearTimeout(undoTimer.current);
        undoTimer.current = setTimeout(() => setUndoItem(null), 5000);
      };

      const undoDelete = () => {
        if (!undoItem) return;
        clearTimeout(undoTimer.current);
        const { cat, item, isCustom, itemStateSnap, customSnap, hiddenSnap } = undoItem;
        if (isCustom) setCustomItems(p => ({ ...p, [cat]: customSnap }));
        else setHiddenItems(hiddenSnap);
        if (itemStateSnap) setItemState(p => ({ ...p, [`${cat}::${item}`]: itemStateSnap }));
        setUndoItem(null);
        showToast('Restored ✓');
      };

      /* hold to delete */
      const startHold = (cat, item, isCustom) => {
        const key = `${cat}::${item}`;
        setHoldKey(key);
        holdTimer.current = setTimeout(() => { setHoldKey(null); performDelete(cat, item, isCustom); }, 600);
      };
      const cancelHold = () => { clearTimeout(holdTimer.current); setHoldKey(null); };

      /* hold to edit name */
      const startNameEdit = (key, currentName) => {
        setEditNameKey(key);
        setEditNameVal(currentName);
      };
      const saveNameEdit = () => {
        if (editNameVal.trim()) updateIS(editNameKey, { name: editNameVal.trim() });
        setEditNameKey(null);
        setEditNameVal('');
      };

      /* reorder */
      const moveCat = (cat, dir) => {
        setCatOrder(p => {
          const idx = p.indexOf(cat), next = dir === 'up' ? idx - 1 : idx + 1;
          if (next < 0 || next >= p.length) return p;
          const o = [...p]; [o[idx], o[next]] = [o[next], o[idx]]; return o;
        });
      };

      /* reset */
      const reset = () => {
        const checked = allKeys.filter(k => getIS(k).checked);
        if (checked.length > 0) setLastShop(checked);
        setItemState(p => { const n={}; Object.entries(p).forEach(([k,v])=>{n[k]={...v,checked:false};}); return n; });
        showToast(checked.length > 0 ? 'Reset · last shop saved ✓' : 'List reset');
      };

      /* recall */
      const recallLastShop = () => {
        if (!lastShop) return;
        setItemState(p => { const n={...p}; lastShop.forEach(k=>{n[k]={...(n[k]||{starred:false,qty:1}),checked:true};}); return n; });
        showToast('Last shop recalled ✓');
      };

      /* send list (copy as text) */
      const sendList = () => {
        const lines = ['🌿 Forage\n'];
        catOrder.forEach(cat => {
          const { defaults=[], customs=[] } = allCategories[cat]||{};
          const unchecked = [...defaults,...customs].filter(item => {
            const is = getIS(`${cat}::${item}`);
            return mode==='week' ? is.starred && !is.checked : !is.checked;
          });
          if (unchecked.length > 0) {
            lines.push(cat);
            unchecked.forEach(item => {
              const is  = getIS(`${cat}::${item}`);
              const name = is.name || item;
              const qty  = is.qty || 1;
              lines.push(`  • ${name}${qty>1?` ×${qty}`:''}`);
            });
            lines.push('');
          }
        });
        navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('List copied ✓')).catch(()=>showToast('Copy failed'));
      };

      /* share app url */
      const shareApp = () => {
        const url = window.location.href;
        if (navigator.share) {
          navigator.share({ title: 'Forage', text: 'My grocery list app', url }).catch(()=>{});
        } else {
          navigator.clipboard.writeText(url).then(()=>showToast('Link copied ✓')).catch(()=>showToast('Copy failed'));
        }
      };

      /* title tap easter egg */
      const handleTitleTap = () => {
        const next = titleTaps + 1;
        setTitleTaps(next);
        clearTimeout(titleTimer.current);
        if (next >= 7) {
          setTitleTaps(0);
          setAceMsg(ACE_LINES[Math.floor(Math.random() * ACE_LINES.length)]);
        } else {
          titleTimer.current = setTimeout(() => setTitleTaps(0), 1500);
        }
      };

      /* toast */
      const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null), 2500); };

      /* visibility */
      const itemVisible = (cat, item) => {
        const is = getIS(`${cat}::${item}`);
        if (mode==='week' && !is.starred) return false;
        if (hideChecked && is.checked) return false;
        const displayName = is.name || item;
        if (search && !displayName.toLowerCase().includes(search.toLowerCase())) return false;
        if (filterCat!=='All' && cat!==filterCat) return false;
        return true;
      };

      const mono = { fontFamily: "'DM Mono', monospace" };

      /* ── Render ── */
      return (
        <div style={{ minHeight:'100vh', background:'#faf9f6', paddingBottom:80 }}>

          {/* Header */}
          <div style={{ background:'#111', color:'#f5f0e8', position:'sticky', top:0, zIndex:100, boxShadow:'0 2px 20px rgba(0,0,0,0.3)' }}>
            <div style={{ maxWidth:540, margin:'0 auto', padding:'16px 16px 14px' }}>

              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
                <div onClick={handleTitleTap} style={{ cursor:'default', userSelect:'none' }}>
                  <h1 style={{ fontSize:24, fontWeight:400, letterSpacing:'0.02em', color:'#f5f0e8' }}>🌿 Forage</h1>
                  <p style={{ ...mono, fontSize:11, color:'#666', marginTop:2, letterSpacing:'0.04em' }}>
                    {checkedCount}/{totalCount} · {pct}%
                    {mode==='week' && <span style={{ color:'#c8a96e', marginLeft:8 }}>⭐ {starredKeys.length}</span>}
                  </p>
                </div>
                <div style={{ display:'flex', gap:5, flexWrap:'wrap', justifyContent:'flex-end' }}>
                  {[
                    { label: mode==='week' ? '⭐ WEEK' : 'ALL',  active: mode==='week',  onClick: ()=>setMode(m=>m==='all'?'week':'all') },
                    { label: allChecked ? '☐ NONE' : '☑ ALL',   active: allChecked,     onClick: toggleAll },
                    { label: '⬆ SEND',   active: false, onClick: sendList },
                    { label: '↗ SHARE',  active: false, onClick: shareApp },
                    { label: '↕ SORT',   active: sortMode, onClick: ()=>setSortMode(r=>!r) },
                  ].map(btn => (
                    <button key={btn.label} onClick={btn.onClick} style={{ ...mono, background: btn.active ? '#c8a96e' : 'transparent', border: `1px solid ${btn.active ? '#c8a96e' : '#444'}`, color: btn.active ? '#111' : '#888', borderRadius:6, padding:'5px 9px', fontSize:10, cursor:'pointer', letterSpacing:'0.05em', whiteSpace:'nowrap' }}>
                      {btn.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Progress */}
              <div style={{ height:2, background:'#2a2a2a', borderRadius:1, overflow:'hidden', marginBottom:10 }}>
                <div style={{ height:'100%', width:`${pct}%`, background:'linear-gradient(90deg,#c8a96e,#e8c98e)', transition:'width 0.4s ease' }} />
              </div>

              {/* Search */}
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." spellCheck={true}
                style={{ ...mono, width:'100%', background:'#1e1e1e', border:'none', borderRadius:7, padding:'9px 12px', color:'#f5f0e8', fontSize:14, outline:'none', marginBottom:8 }} />

              {/* Filter row */}
              <div style={{ display:'flex', gap:6 }}>
                <select value={filterCat} onChange={e=>setFilterCat(e.target.value)}
                  style={{ ...mono, flex:1, background:'#1e1e1e', border:'none', borderRadius:7, padding:'7px 10px', color:'#888', fontSize:12, outline:'none', minWidth:0 }}>
                  <option value="All">All categories</option>
                  {catOrder.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                <button onClick={()=>setHideChecked(h=>!h)}
                  style={{ ...mono, background: hideChecked?'#c8a96e':'transparent', border:`1px solid ${hideChecked?'#c8a96e':'#444'}`, color: hideChecked?'#111':'#888', borderRadius:6, padding:'5px 9px', fontSize:10, cursor:'pointer', letterSpacing:'0.05em', whiteSpace:'nowrap' }}>
                  {hideChecked ? 'SHOW ALL' : 'HIDE DONE'}
                </button>
                {lastShop && (
                  <button onClick={recallLastShop}
                    style={{ ...mono, background:'transparent', border:'1px solid #444', color:'#888', borderRadius:6, padding:'5px 9px', fontSize:10, cursor:'pointer', letterSpacing:'0.05em', whiteSpace:'nowrap' }}>
                    ↩ LAST
                  </button>
                )}
              </div>
            </div>
          </div>

          {/* Categories */}
          <div style={{ maxWidth:540, margin:'0 auto', padding:'12px 14px 0' }}>
            {catOrder.map((cat, catIdx) => {
              const { defaults=[], customs=[] } = allCategories[cat]||{};
              const allItems     = [...defaults, ...customs];
              const visibleItems = allItems.filter(item => itemVisible(cat, item));
              const isOpen       = openCats[cat] !== false;
              const catChecked   = allItems.filter(item => getIS(`${cat}::${item}`).checked).length;

              if (visibleItems.length === 0 && editingCat !== cat) return null;

              return (
                <div key={cat} style={{ marginBottom:6 }}>
                  {/* Cat header */}
                  <div style={{ display:'flex', alignItems:'center', borderBottom:'1px solid #e8e3da', paddingBottom:6, paddingTop:8, gap:4 }}>
                    {sortMode && (
                      <div style={{ display:'flex', flexDirection:'column', marginRight:2 }}>
                        <button onClick={()=>moveCat(cat,'up')} disabled={catIdx===0}
                          style={{ background:'none', border:'none', cursor: catIdx===0?'default':'pointer', color: catIdx===0?'#e0dbd0':'#999', fontSize:10, padding:'1px 3px', lineHeight:1 }}>▲</button>
                        <button onClick={()=>moveCat(cat,'down')} disabled={catIdx===catOrder.length-1}
                          style={{ background:'none', border:'none', cursor: catIdx===catOrder.length-1?'default':'pointer', color: catIdx===catOrder.length-1?'#e0dbd0':'#999', fontSize:10, padding:'1px 3px', lineHeight:1 }}>▼</button>
                      </div>
                    )}
                    <button onClick={()=>setOpenCats(p=>({...p,[cat]:!p[cat]}))}
                      style={{ background:'none', border:'none', cursor:'pointer', textAlign:'left', flex:1, padding:0 }}>
                      <span style={{ ...mono, fontSize:11, fontWeight:500, color:'#7a6a5a', letterSpacing:'0.08em', textTransform:'uppercase' }}>{cat}</span>
                      {catChecked>0 && <span style={{ ...mono, fontSize:10, color:'#c8a96e', marginLeft:6 }}>{catChecked}/{allItems.length}</span>}
                    </button>
                    <button onClick={()=>{ setEditingCat(editingCat===cat?null:cat); setNewItemText(''); setOpenCats(p=>({...p,[cat]:true})); }}
                      style={{ background: editingCat===cat?'#c8a96e':'none', border:`1px solid ${editingCat===cat?'#c8a96e':'#ddd'}`, borderRadius:5, cursor:'pointer', color: editingCat===cat?'#111':'#ccc', fontSize:17, padding:'0 7px 1px', lineHeight:'1.45' }}>+</button>
                    <span onClick={()=>setOpenCats(p=>({...p,[cat]:!p[cat]}))}
                      style={{ color:'#ccc', fontSize:12, display:'inline-block', marginLeft:2, cursor:'pointer', userSelect:'none', transform: isOpen?'rotate(0deg)':'rotate(-90deg)', transition:'transform 0.2s' }}>▾</span>
                  </div>

                  {/* Inline add */}
                  {editingCat===cat && (
                    <div style={{ display:'flex', gap:6, padding:'8px 0 4px' }}>
                      <input autoFocus value={newItemText} onChange={e=>setNewItemText(e.target.value)}
                        onKeyDown={e=>{ if(e.key==='Enter') addItem(cat); if(e.key==='Escape') setEditingCat(null); }}
                        placeholder={`Add to ${cat.split(' ').slice(1).join(' ')}...`}
                        spellCheck={true}
                        style={{ flex:1, background:'#fff', border:'1px solid #e8e3da', borderRadius:7, padding:'8px 10px', fontSize:15, color:'#2a1a0a', outline:'none' }} />
                      <button onClick={()=>addItem(cat)} style={{ ...mono, background:'#111', color:'#f5f0e8', border:'none', borderRadius:7, padding:'8px 12px', fontSize:12, cursor:'pointer' }}>ADD</button>
                      <button onClick={()=>setEditingCat(null)} style={{ background:'transparent', color:'#aaa', border:'1px solid #e0dbd0', borderRadius:7, padding:'8px 9px', fontSize:12, cursor:'pointer' }}>✕</button>
                    </div>
                  )}

                  {/* Items */}
                  {isOpen && visibleItems.map(item => {
                    const key        = `${cat}::${item}`;
                    const is         = getIS(key);
                    const isCustom   = customs.includes(item);
                    const qty        = is.qty || 1;
                    const isHeld     = holdKey === key;
                    const displayName = is.name || item;
                    const isEditingName = editNameKey === key;

                    return (
                      <div key={key} style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 2px', borderBottom:'1px solid #f2ede6', background: isHeld?'#fff8f8':'transparent', transition:'background 0.1s' }}>

                        {/* Checkbox */}
                        <div onClick={()=>toggleCheck(key)}
                          style={{ width:21, height:21, borderRadius:5, flexShrink:0, cursor:'pointer', border: is.checked?'2px solid #c8a96e':'2px solid #d8d3cc', background: is.checked?'#c8a96e':'transparent', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s' }}>
                          {is.checked && <svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="#111" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>}
                        </div>

                        {/* Name — tap to check, hold to edit */}
                        {isEditingName ? (
                          <input
                            autoFocus
                            value={editNameVal}
                            onChange={e=>setEditNameVal(e.target.value)}
                            onBlur={saveNameEdit}
                            onKeyDown={e=>{ if(e.key==='Enter') saveNameEdit(); if(e.key==='Escape'){setEditNameKey(null);} }}
                            spellCheck={true}
                            style={{ flex:1, background:'#fff', border:'1px solid #c8a96e', borderRadius:6, padding:'4px 8px', fontSize:15, color:'#2a1a0a', outline:'none' }}
                          />
                        ) : (
                          <span
                            onClick={()=>toggleCheck(key)}
                            onMouseDown={()=>{ nameTimer.current = setTimeout(()=>startNameEdit(key, displayName), 600); }}
                            onMouseUp={()=>clearTimeout(nameTimer.current)}
                            onMouseLeave={()=>clearTimeout(nameTimer.current)}
                            onTouchStart={()=>{ nameTimer.current = setTimeout(()=>startNameEdit(key, displayName), 600); }}
                            onTouchEnd={()=>clearTimeout(nameTimer.current)}
                            onTouchMove={()=>clearTimeout(nameTimer.current)}
                            style={{ flex:1, fontSize:15, color: is.checked?'#bbb':'#2a1a0a', textDecoration: is.checked?'line-through':'none', cursor:'pointer', transition:'all 0.15s', userSelect:'none', WebkitUserSelect:'none' }}>
                            {displayName}
                          </span>
                        )}

                        {/* Qty */}
                        {editQtyKey===key ? (
                          <div style={{ display:'flex', alignItems:'center', gap:3 }}>
                            <button onClick={()=>{ qty<=1?setEditQtyKey(null):setQty(key,qty-1); }} style={{ ...mono, background:'#f5f0e8', border:'1px solid #e8e3da', borderRadius:4, width:22, height:22, cursor:'pointer', fontSize:14, color:'#5a4a3a', padding:0, display:'flex', alignItems:'center', justifyContent:'center' }}>−</button>
                            <span style={{ ...mono, fontSize:13, color:'#5a4a3a', minWidth:20, textAlign:'center' }}>{qty}</span>
                            <button onClick={()=>setQty(key,qty+1)} style={{ ...mono, background:'#f5f0e8', border:'1px solid #e8e3da', borderRadius:4, width:22, height:22, cursor:'pointer', fontSize:14, color:'#5a4a3a', padding:0, display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>
                            <button onClick={()=>setEditQtyKey(null)} style={{ ...mono, background:'#f5f0e8', border:'1px solid #e8e3da', borderRadius:4, width:22, height:22, cursor:'pointer', fontSize:12, color:'#aaa', padding:0, display:'flex', alignItems:'center', justifyContent:'center' }}>✓</button>
                          </div>
                        ) : (
                          <button onClick={()=>setEditQtyKey(key)}
                            style={{ ...mono, background: qty>1?'#f0e8d4':'transparent', border: qty>1?'1px solid #e0c89e':'1px solid transparent', borderRadius:4, padding:'2px 5px', fontSize:11, color: qty>1?'#8a6a3a':'#ccc', cursor:'pointer' }}>
                            {qty>1?`×${qty}`:'×'}
                          </button>
                        )}

                        {/* Star */}
                        <button onClick={()=>toggleStar(key)}
                          style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, opacity: is.starred?1:0.15, padding:'0 1px', transition:'opacity 0.15s' }}>⭐</button>

                        {/* Hold-to-delete */}
                        <button
                          onMouseDown={()=>startHold(cat,item,isCustom)}
                          onMouseUp={cancelHold} onMouseLeave={cancelHold}
                          onTouchStart={e=>{e.preventDefault();startHold(cat,item,isCustom);}}
                          onTouchEnd={cancelHold} onTouchMove={cancelHold}
                          style={{ background: isHeld?'#fee8e8':'none', border: isHeld?'1px solid #f0c0c0':'1px solid transparent', borderRadius:4, cursor:'pointer', color: isHeld?'#e07070':'#d8d3cc', fontSize:14, padding:'1px 4px', lineHeight:1, transition:'all 0.1s', userSelect:'none', WebkitUserSelect:'none' }}>
                          ✕
                        </button>
                      </div>
                    );
                  })}
                </div>
              );
            })}

            {hiddenItems.length > 0 && (
              <button onClick={()=>{setHiddenItems([]);showToast('Hidden items restored');}}
                style={{ ...mono, width:'100%', marginTop:16, background:'transparent', border:'1px dashed #ddd', borderRadius:8, padding:10, color:'#bbb', fontSize:11, cursor:'pointer', letterSpacing:'0.04em' }}>
                RESTORE {hiddenItems.length} HIDDEN ITEM{hiddenItems.length!==1?'S':''}
              </button>
            )}

            <button onClick={reset}
              style={{ ...mono, width:'100%', marginTop:8, marginBottom:8, background:'transparent', border:'1px solid #e8e3da', borderRadius:8, padding:10, color:'#bbb', fontSize:11, cursor:'pointer', letterSpacing:'0.04em' }}>
              RESET LIST{lastShop?' · SAVE LAST SHOP':''}
            </button>
          </div>

          {/* Undo toast */}
          {undoItem && (
            <div style={{ position:'fixed', bottom:28, left:'50%', transform:'translateX(-50%)', background:'#2a1a0a', color:'#f5f0e8', padding:'10px 8px 10px 18px', borderRadius:20, fontSize:13, boxShadow:'0 4px 20px rgba(0,0,0,0.4)', zIndex:200, display:'flex', alignItems:'center', gap:10, whiteSpace:'nowrap', ...mono }}>
              <span>Deleted <em style={{ fontStyle:'normal', color:'#c8a96e' }}>{undoItem.item}</em></span>
              <button onClick={undoDelete} style={{ background:'#c8a96e', color:'#111', border:'none', borderRadius:12, padding:'4px 12px', fontSize:12, cursor:'pointer', fontWeight:700, letterSpacing:'0.05em', ...mono }}>UNDO</button>
            </div>
          )}

          {/* General toast */}
          {toast && !undoItem && (
            <div style={{ position:'fixed', bottom:28, left:'50%', transform:'translateX(-50%)', background:'#111', color:'#f5f0e8', padding:'10px 20px', borderRadius:20, fontSize:13, boxShadow:'0 4px 20px rgba(0,0,0,0.35)', zIndex:200, whiteSpace:'nowrap', ...mono }}>
              {toast}
            </div>
          )}

          {/* Ace easter egg */}
          {aceMsg && (
            <div onClick={()=>setAceMsg(null)}
              style={{ position:'fixed', bottom:40, left:'50%', transform:'translateX(-50%)', background:'#1a1a1a', color:'#f5f0e8', padding:'20px 28px', borderRadius:16, fontSize:13, boxShadow:'0 8px 32px rgba(0,0,0,0.5)', zIndex:300, whiteSpace:'pre', textAlign:'center', lineHeight:1.7, cursor:'pointer', animation:'popIn 0.3s ease forwards', ...mono }}>
              {aceMsg}
              <div style={{ marginTop:12, fontSize:10, color:'#666', letterSpacing:'0.08em' }}>// TAP TO CLOSE</div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
